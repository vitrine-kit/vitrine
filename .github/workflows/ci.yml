name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Typecheck registry (copy-in feature files)
        run: pnpm typecheck:registry

      - name: Typecheck templates (pure zero-config + mappers)
        run: pnpm typecheck:templates

      - name: Test
        run: pnpm test

      - name: Validate schemas
        run: pnpm schemas
