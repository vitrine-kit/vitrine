name: Release

# Two-step Changesets flow on push to main:
#   1) there are unconsumed changesets → the bot opens/updates the "Version Packages" PR
#      (version bump + CHANGELOG assembly);
#   2) that PR is merged (changesets consumed) → publish runs:
#      `pnpm release` publishes the changed @vitrine-kit/* to the public npm (registry.npmjs.org),
#      changeset publish sets git tags, and createGithubReleases makes GitHub Releases.
# The source archive of each release is what `vitrine kit update` pulls
# (gh release download --archive=tar.gz, see packages/cli/src/kit-update.ts).
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # git tags + GitHub Releases
  pull-requests: write # "Version Packages" PR
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs history/tags

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@vitrine-kit'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version PR / Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages # version bump from changesets
          publish: pnpm release # turbo build && changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # "Version Packages" PR + GitHub Releases
          # changesets/action specifically looks for NPM_TOKEN; without it, it falls back to OIDC trusted publishing
          # (which we have not configured) and publishing silently never reaches npm.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # token auth for npm publish
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # .npmrc from setup-node
          NPM_CONFIG_PROVENANCE: true # provenance signing (requires id-token: write)
